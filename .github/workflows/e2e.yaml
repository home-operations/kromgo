---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: E2E

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Go E2E
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true
          install_args: --locked

      - name: Cache Go modules and build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Fetch build assets
        run: mise run assets

      - name: Run e2e tests
        run: mise run test-e2e

  helm-e2e:
    name: Helm E2E (kind)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true
          install_args: --locked

      - name: Create Kind cluster
        id: kind
        background: true
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: kromgo-e2e
          wait: 60s

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Resolve toolchain versions
        id: tools
        run: |
          echo "go=$(mise config get tools.go)" >> "$GITHUB_OUTPUT"
          echo "node=$(mise config get tools.node)" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: ghcr.io/home-operations/kromgo:e2e
          build-args: |
            GO_VERSION=${{ steps.tools.outputs.go }}
            NODE_VERSION=${{ steps.tools.outputs.node }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - wait: kind

      - name: Cluster info
        run: |
          kubectl version
          kubectl get nodes

      - name: Load image into kind
        run: kind load docker-image ghcr.io/home-operations/kromgo:e2e --name kromgo-e2e

      - name: Helm install + test
        env:
          KROMGO_TEST_IMAGE_TAG: e2e
          KROMGO_TEST_PULL_POLICY: Never
        run: |
          export KUBECONFIG="${HOME}/.kube/config"
          mise run helm-test
